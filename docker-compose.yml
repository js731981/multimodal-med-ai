services:
  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # App bind settings (override in .env if desired)
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-8000}
      # Qdrant (defaults match .env.example)
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-medical_kb}
      # Log/runtime tuning
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-2}
    depends_on:
      - qdrant
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import os,urllib.request; url=f\"http://127.0.0.1:{os.getenv('PORT','8000')}/api/v1/health\"; urllib.request.urlopen(url, timeout=3).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 6

volumes:
  qdrant_storage:
